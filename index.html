<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Satxm's Guide</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <!-- 设置浏览器图标 -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <!-- 默认主题 -->
    <link
      href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css"
      rel="stylesheet"
    />
    <!-- LateX -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css"
    />
    <!-- 加载字体 -->
    <link
      href="https://cdn.jsdelivr.net/npm/cn-fontsource-fz-hei-b-01-regular/font.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@600&family=Pattaya&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-webfont/1.6.0/style.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fastly.jsdelivr.net/gh/spite-triangle/docsify-codeLineNum@latest/css/codeLineNum.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --docsifytabs-border-color: #ededed;
        --docsifytabs-tab-highlight-color: purple;
      }
      body {
        font-family: "LXGW WenKai", sans-serif, "Times New Roman", 思源宋体,
          "Noto Serif SC", serif;
        line-height: 125%;
      }
      @media screen and (min-width: 960px) {
        .content {
          margin: 0 auto;
          padding: 0 1.5rem 4rem;
          max-width: 86rem;
        }
      }
      .sidebar ul li a {
        font-size: 14px;
      }
      .app-name .app-name-link {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
        font-size: 14;
      }
      .docsify-copy-code-button {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
        padding: 0.25em 0.5em !important;
        font-size: 0.8em !important;
        border-radius: 10px !important;
      }
      .markdown-section code {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
      }
      .markdown-section pre {
        padding: 10px 0.5rem;
        border-radius: 10px;
      }
      .markdown-section pre > code {
        padding: 8px;
      }
      .pagination-item-title {
        font-size: 18px !important;
      }
      .markdown-section h1 {
        font-size: 1.5rem;
      }
      .markdown-section h2 {
        font-size: 1.25rem;
        margin: 30px 0 0.8rem;
      }
      .markdown-section h3 {
        font-size: 1rem;
      }
      code[class*="lang-"] {
        font-size: 14px !important;
      }
      footer {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">加载中...</div>
    <script>
      window.$docsify = {
        name: "Satxm's Guide",
        repo: "https://github.com/Satxm/satxm.github.io",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        maxLevel: 5,
        subMaxLevel: 4,
        mergeNavbar: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索",
          placeholder: {
            "/": "搜索",
          },
          noData: "无结果",
          depth: 4,
          hideOtherSidebarContent: false,
          namespace: "Docsify-Guide",
        },
        copyCode: {
          buttonText: {
            "/": "复制",
          },
          errorText: {
            "/": "错误",
          },
          successText: {
            "/": "复制成功",
          },
        },
        tabs: {
          persist: true,
          sync: true,
          theme: "classic",
          tabComments: true,
          tabHeadings: true,
        },
        pagination: {
          previousText: "上一篇",
          nextText: {
            "/": "下一篇",
          },
          crossChapter: true,
          crossChapterText: true,
        },
        plugins: [
          function editButton(hook, vm) {
            $docsify.formatUpdated = "{YYYY}/{MM}/{DD} {HH}:{mm}";
            hook.beforeEach((html) => {
              const url =
                "https://github.com/Satxm/satxm.github.io/tree/main/" +
                vm.route.file;
              const edit = "[📝 在 Github 上编辑](" + url + ")\n";
              const lsat =
                "<p style='text-align: right;'>最后修改于：{docsify-updated}</p>";
              return edit + html + "<hr/>" + lsat;
            });
          },
          function pageFooter(hook, vm) {
            var date = new Date();
            var year = date.getFullYear();
            var footer = [
              "<hr><br>",
              "<footer>",
              '<span><a href="https://github.com/Satxm">Satxm</a> &copy; ' +
                year +
                ".</span>",
              '<span> 由 <a href="https://github.com/docsifyjs/docsify" target="_blank">Docsify</a> 强力驱动</span>',
              "</footer>",
            ].join("");
            hook.afterEach(function (html) {
              return html + footer;
            });
          },
        ],
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify"></script>
    <!-- emoji表情 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <!-- 图片缩放 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <!-- 搜索功能 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- 复制到剪贴板 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <!-- 代码高亮 -->
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-php.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-vim.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-docker.min.js"></script>
    <!-- 首页一言 -->
    <script src="/js/hitokoto.js"></script>
    <!-- 标签页 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-tabs"></script>
    <!-- 页脚模块 -->
    <script src="//cdn.jsdelivr.net/npm/@alertbox/docsify-footer"></script>
    <!-- 注释模块 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-footnote"></script>
    <!-- 在 Github 上编辑 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-edit-on-github"></script>
    <!-- 分页导航 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <!-- Latex -->
    <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
    <!-- Docsify-Katex -->
    <script src="//cdn.jsdelivr.net/npm/docsify-katex"></script>
    <!-- 行号 -->
    <script src="https://cdn.jsdelivr.net/gh/spite-triangle/docsify-codeLineNum@latest/script/codeLineNum.min.js"></script>
  </body>
</html>
