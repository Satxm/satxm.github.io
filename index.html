<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Satxm's Guide</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <!-- 设置浏览器图标 -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <!-- 默认主题 -->
    <link
      href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css"
      rel="stylesheet"
    />
    <!-- LateX -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css"
    />
    <!-- 加载字体 -->
    <link
      href="https://cdn.jsdelivr.net/npm/cn-fontsource-fz-hei-b-01-regular/font.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@600&family=Pattaya&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-webfont/1.6.0/style.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.css"
    />
    <style>
      :root {
        --docsifytabs-border-color: #ededed;
        --docsifytabs-tab-highlight-color: purple;
      }
      body {
        font-family: "LXGW WenKai", sans-serif, "Times New Roman", 思源宋体,
          "Noto Serif SC", serif;
        line-height: 125%;
      }
      .content {
        margin: 0 auto;
        padding: 0 1.5rem 4rem;
        max-width: 86rem;
      }
      .sidebar ul li a {
        font-size: 14px;
      }
      .app-name .app-name-link {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
        font-size: 14;
      }
      .docsify-copy-code-button {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
        font-size: 0.8em !important;
        border-radius: 10px !important;
      }
      .markdown-section code {
        font-family: "Inconsolata", "LXGW WenKai", sans-serif;
      }
      .markdown-section pre {
        padding: 10px 0.5rem;
      }
      .markdown-section pre > code {
        padding: 8px;
      }
      .pagination-item-title {
        font-size: 18px !important;
      }
      .markdown-section h1 {
        font-size: 1.5rem;
      }
      .markdown-section h2 {
        font-size: 1.25rem;
        margin: 30px 0 0.8rem;
      }
      .markdown-section h3 {
        font-size: 1rem;
      }
      code[class*="language-"] {
        font-size: 14px !important;
      }
    </style>
  </head>
  <body>
    <div id="app">加载中...</div>
    <script>
      window.$docsify = {
        name: "Satxm's Guide", // 项目名称
        repo: "https://github.com/Satxm/satxm.github.io", // 仓库地址，点击右上角的Github章鱼猫头像会跳转到此地址
        loadSidebar: true, // 侧边栏，默认加载的是项目根目录下的_sidebar.md文件
        loadNavbar: true, // 导航栏，默认加载的是项目根目录下的_navbar.md文件
        coverpage: true, // 封面，默认加载的是项目根目录下的_coverpage.md文件
        maxLevel: 5, // 最大渲染的标题层级
        subMaxLevel: 4, // 自定义侧边栏后默认不会再生成目录，设置生成目录的最大层级（建议配置为2-4）
        mergeNavbar: true, // 小屏设备下合并导航栏到侧边栏
        /*搜索相关设置*/
        search: {
          maxAge: 86400000, // 过期时间，单位毫秒，默认一天
          paths: "auto", // 注意：仅适用于 paths: 'auto' 模式
          placeholder: "搜索",
          // 本地化
          placeholder: {
            "/": "搜索",
          },
          noData: "无结果",
          depth: 4,
          hideOtherSidebarContent: false,
          namespace: "Docsify-Guide",
        },
        copyCode: {
          buttonText: {
            "/": "复制",
          },
          errorText: {
            "/": "错误",
          },
          successText: {
            "/": "复制成功",
          },
        },
        tabs: {
          persist: true, // default
          sync: true, // default
          theme: "classic", // default
          tabComments: true, // default
          tabHeadings: true, // default
        },
        pagination: {
          previousText: "上一篇",
          nextText: {
            "/": "下一篇",
          },
          crossChapter: true,
          crossChapterText: true,
        },
        plugins: [
          function editButton(hook, vm) {
            // The date template pattern
            $docsify.formatUpdated = "{YYYY}/{MM}/{DD} {HH}:{mm}";

            hook.beforeEach((html) => {
              const url =
                "https://github.com/Satxm/satxm.github.io/tree/main/" +
                vm.route.file;
              const edit = "[📝 在 Github 上编辑](" + url + ")\n";
              const lsat =
                "<p style='text-align: right;'>最后修改于：{docsify-updated}</p>";

              return edit + html + "<hr/>" + lsat;
            });
          },
          function pageFooter(hook, vm) {
            var footer = [
              "<footer style='text-align: center;'>",
              '<span><a href="https://github.com/Satxm">Satxm</a> &copy; 2024.</span>',
              '<span> 由 <a href="https://github.com/docsifyjs/docsify" target="_blank">Docsify</a> 强力驱动</span>',
              "</footer>",
            ].join("");

            hook.afterEach(function (html) {
              return html + footer;
            });
          },
          function (hook, vm) {
            hook.doneEach(function (html) {
              Prism.highlightAll();
            });
          },
        ],
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify"></script>
    <!-- emoji表情 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <!-- 图片缩放 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <!-- 搜索功能 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- 复制到剪贴板 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <!-- 代码高亮 -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-vim.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
    <!-- 首页一言 -->
    <script src="/js/hitokoto.js"></script>
    <!-- 标签页 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
    <!-- 页脚模块 -->
    <script src="//cdn.jsdelivr.net/npm/@alertbox/docsify-footer/dist/docsify-footer.min.js"></script>
    <!-- 注释模块 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-footnote/dist/docsify-footnote.min.js"></script>
    <!-- 在 Github 上编辑 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-edit-on-github"></script>
    <!-- 分页导航 -->
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <!-- Latex -->
    <script src="//cdn.jsdelivr.net/npm/marked@4"></script>
    <!-- CDN files for docsify-katex -->
    <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
    <!-- or <script src="//cdn.jsdelivr.net/gh/upupming/docsify-katex@latest/dist/docsify-katex.js"></script> -->
  </body>
</html>
